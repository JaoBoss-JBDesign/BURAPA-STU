<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BURAPA-STU</title>
</head>

<body>

<h1>BURAPA-STU</h1>
<h3>ระบบบันทึกสถิติการมาเรียนของนักเรียน</h3>

<select id="classrooms"></select>

<br><br>

ชายทั้งหมด <input type="number" id="all_boys">
หญิงทั้งหมด <input type="number" id="all_girls">

ชายมาวันนี้ <input type="number" id="boys_today">
หญิงมาวันนี้ <input type="number" id="girls_today">

ป่วย <input type="number" id="sick"><br>
ลา <input type="number" id="leave"><br>
ขาด <input type="number" id="absent"><br>

<br><br>

<button onclick="submitData()">บันทึกสถิติ</button>

<script>

const api = "https://script.google.com/macros/s/AKfycbxDfNIpPlZpremzXO3j_kxBijxxWn46KZdim27gZLuCKzgjOonYVRNLB7PfKaoYlj2LMg/exec";

async function loadClassrooms(){

const res = await fetch(api+"?mode=getClassrooms");
const data = await res.json();

const select = document.getElementById("classrooms");

select.innerHTML="";

data.forEach(c=>{

let option = document.createElement("option");

option.value = c;
option.textContent = c;

select.appendChild(option);

});

}
  
async function submitData(){

const allboys =
Number(document.getElementById("all_boys").value);

const allgirls =
Number(document.getElementById("all_girls").value);

const boystoday =
Number(document.getElementById("boys_today").value);

const girlstoday =
Number(document.getElementById("girls_today").value);

const sick =
Number(document.getElementById("sick").value);

const leave =
Number(document.getElementById("leave").value);

const absent =
Number(document.getElementById("absent").value);

if(!allboys || !allgirls){
alert("กรุณากรอกจำนวนนักเรียนทั้งหมด");
return;
}

const data = {

date:new Date().toLocaleDateString("th-TH"),

classroom:
document.getElementById("classrooms").value,

all_boys:allboys,
all_girls:allgirls,

boys_today:boystoday,
girls_today:girlstoday,

sick:sick,
leave:leave,
absent:absent,

timestamp:new Date(),
source:"web"

};

await fetch(api,{
method:"POST",
body:JSON.stringify(data)
});

alert("บันทึกเรียบร้อยแล้ว");

}

loadClassrooms();

</script>

</body>
</html>
