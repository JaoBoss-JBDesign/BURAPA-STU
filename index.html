<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BURAPA-STU</title>
</head>

<body>

<h2>ระบบบันทึกสถิติการมาเรียนของนักเรียน โรงเรียนเทศบาลบูรพาอุบล</h2>

<select id="classroom"></select>

<br><br>

ชาย <input type="number" id="allmale"><br>
หญิง <input type="number" id="allfemale"><br>
ชายมาวันนี้ <input type="number" id="maletoday"><br>
หญิงมาวันนี้ <input type="number" id="femaletoday"><br>
ป่วย <input type="number" id="sick"><br>
ลา <input type="number" id="leave"><br>
ขาด <input type="number" id="absent"><br>

<br><br>

<button onclick="submitData()">บันทึกสถิติ</button>

<script>

const api = "https://script.google.com/macros/s/AKfycbxDfNIpPlZpremzXO3j_kxBijxxWn46KZdim27gZLuCKzgjOonYVRNLB7PfKaoYlj2LMg/exec";

async function loadClassrooms(){
  const res = await fetch(api+"?mode=getClassrooms");
  const data = await res.json();

  const select = document.getElementById("classroom");

  data.forEach(c=>{
    let option = document.createElement("option");
    option.value = c;
    option.textContent = c;
    select.appendChild(option);
  });
}

async function submitData(){

const allMale =
Number(document.getElementById("allMale").value);

const allFemale =
Number(document.getElementById("allFemale").value);

const maleToday =
Number(document.getElementById("maleToday").value);

const femaleToday =
Number(document.getElementById("femaleToday").value);

const sick =
Number(document.getElementById("sick").value);

const leave =
Number(document.getElementById("leave").value);

const absent =
Number(document.getElementById("absent").value);

const data = {

date:new Date().toLocaleDateString(),

classroom:
document.getElementById("classroom").value,

allMale:allMale,
allFemale:allFemale,

maleToday:maleToday,
femaleToday:femaleToday,

present:maleToday+femaleToday,

sick:sick,
leave:leave,
absent:absent,

timestamp:new Date(),

source:"web"

};

await fetch(api,{
method:"POST",
body:JSON.stringify(data)
});

alert("บันทึกเรียบร้อยแล้ว");

}

loadClassrooms();

</script>

</body>
</html>
